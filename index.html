         STRUCTURED DATA — JSON-LD
         TaxiService schema → eligible for Google rich results
    ════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TaxiService",
      "name": "Trending Drop Taxi",
      "alternateName": ["Trending Taxi", "Trending Drop Taxi Service"],
      "description": "Trending Drop Taxi offers premium outstation cab service across Tamil Nadu at ₹16/km with no return fare and no hidden charges.",
      "url": "https://trendingtaxi.in",
      "logo": "https://trendingtaxi.in/favicon.svg",
      "telephone": "+91-XXXXXXXXXX",
      "priceRange": "₹16–₹22 per km",
      "currenciesAccepted": "INR",
      "paymentAccepted": "Cash, UPI, Online",
      "areaServed": [
        "Tirunelveli", "Coimbatore", "Chennai", "Madurai",
        "Trichy", "Salem", "Nagercoil", "Tenkasi",
        "Bangalore", "Kerala", "Tamil Nadu"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tirunelveli",
        "addressRegion": "Tamil Nadu",
        "postalCode": "627001",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "8.7139",
        "longitude": "77.7567"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "500",
        "bestRating": "5"
      },
      "sameAs": [
        "https://wa.me/91XXXXXXXXXX"
      ]
    }
    </script>

    <!-- ── FAQ Schema → "People Also Ask" box in Google ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Trending Drop Taxi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trending Drop Taxi is a premium outstation cab service in Tamil Nadu offering flat-rate per-km pricing with no return fare and no hidden charges. Available 24/7 from Tirunelveli, Coimbatore, Chennai and Madurai."

        },
        {
          "@type": "Question",
          "name": "How do I book Trending Taxi?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can book Trending Drop Taxi by filling the online form at trendingtaxi.in, getting an instant fare estimate, and confirming via WhatsApp. We are available 24/7."
          }
        },
        {
          "@type": "Question",
          "name": "Does Trending Drop Taxi charge return fare?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Trending Drop Taxi charges only one-way fare. You pay only for the distance you travel — zero return fare, zero hidden charges."
          }
        },
        {
          "@type": "Question",
          "name": "What is the per km rate for Trending Drop Taxi?",
          "acceptedAnswer": {
            "@type": "Answer",
